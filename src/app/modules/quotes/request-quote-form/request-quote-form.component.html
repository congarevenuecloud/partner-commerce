<div class="card">
  <div class="card-body">
    <!-- Row 1: Sold To | Price List -->
    <div class="row">
      <div class="col-12 col-md-6">
        <div class="form-group">
          <apt-output-field [record]="quote.Account" field="Name" [label]="'CUSTOM_LABELS.SOLD_TO' | translate" [editable]="false"
            [showQuickView]="true">
          </apt-output-field>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="form-group">
          <apt-output-field [record]="quote.PriceList" field="Name" [label]="'CUSTOM_LABELS.PRICELIST' | translate" [editable]="false"
            [showQuickView]="true"></apt-output-field>
        </div>
      </div>
    </div>
    <!-- Row 2: Quote Title | Partner Account -->
    <div class="row">
      <div class="col-12 col-md-6">
        <div class="form-group">
          <apt-input-field [entity]="quote" [field]="'ProposalName'" [(ngModel)]="quote.ProposalName"
            (ngModelChange)="quoteChange()" [label]="'CREATE_QUOTE.QUOTE_TITLE' | translate" [required]="true"
            [errorMsg]="!quote.ProposalName ? ('CREATE_QUOTE.TITLE_REQUIRED' | translate) : ''"></apt-input-field>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="form-group form-group--with-error">
          <apt-input-field [entity]="quote" [field]="'PartnerAccount'" [lookupOptions]="partnerAccountLookupOptions"
            [(ngModel)]="partnerAccount" (ngModelChange)="partnerAccountChange()"
            [label]="'CREATE_QUOTE.PARTNER_ACCOUNT' | translate" [required]="true"
            [errorMsg]="'CREATE_QUOTE.PARTNER_ACCOUNT_REQUIRED' | translate">
          </apt-input-field>
        </div>
      </div>
    </div>
    <!-- Row 3: Primary Contact | RFP Response Due Date -->
    <div class="row">
      <div class="col-12 col-md-6">
        <div class="form-group">
          <apt-input-field placeholder="{{'CREATE_QUOTE.SEARCH_CONTACTS' | translate }}" [entity]="quote"
            [field]="'PrimaryContact'" [lookupOptions]="lookupOptions" [required]="true" [(ngModel)]="contact"
            (ngModelChange)="primaryContactChange()" [errorMsg]="('CREATE_QUOTE.PRIMARY_CONTACT_REQUIRED' | translate)">
          </apt-input-field>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="form-group">
          <apt-input-field [entity]="quote" [field]="'RFPResponseDueDate'" [(ngModel)]="quote.RFPResponseDueDate"
            (ngModelChange)="quoteChange()">
          </apt-input-field>
        </div>
      </div>
    </div>
    <!-- Row 4: Ship To | Bill To -->
    <div class="row">
      <div class="col-12 col-md-6">
        <div class="form-group">
          <apt-input-field [entity]="quote" [field]="'ShipToAccount'" [(ngModel)]="quote.ShipToAccount"
            (ngModelChange)="shipToChange()"></apt-input-field>
          <small class="px-1 font-italic d-block" *ngIf="shipToAccount$ | async as shipToAccount">
            <apt-address [ngModel]="quote?.ShipToAccount" [readonly]="true" type="Shipping" [showLabel]="false">
            </apt-address>
          </small>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="form-group">
          <apt-input-field [entity]="quote" [field]="'BillToAccount'" [(ngModel)]="quote.BillToAccount"
            (ngModelChange)="billToChange()"></apt-input-field>
          <small class="px-1 font-italic d-block" *ngIf="billToAccount$ | async as billToAccount">
            <apt-address [ngModel]="quote?.BillToAccount" [readonly]="true" type="Billing" [showLabel]="false">
            </apt-address>
          </small>
        </div>
      </div>
    </div>
    <!-- Row 5: Source Channel -->
    <div class="row">
      <div class="col-12 col-md-6">
        <div class="form-group mb-0">
          <apt-output-field [record]="quote" field="SourceChannel" [label]="'COMMON.SOURCE_CHANNEL' | translate"
            [editable]="false"></apt-output-field>
        </div>
      </div>
    </div>
  </div>
</div>
